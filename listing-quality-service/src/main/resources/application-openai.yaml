spring:
  ai:
    model:
      chat: openai
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        model: ${OPENAI_CHAT_MODEL:gpt-5.4-mini}
        # OpenAI's newer models require max-completion-tokens (the legacy max-tokens is rejected).
        max-completion-tokens: 800

# GPT-5.6 accepts only its default temperature. Keep this provider constraint explicit so
# the effective value is visible in configuration and can be recorded by evaluations.
listing-quality:
  ai:
    temperature: 1
