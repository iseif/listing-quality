global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: listing-quality-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080

  - job_name: listing-quality-enrichment
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8081
